<%- include('partials/start-page.html', {title: title}) %>
	<div class="mx-auto max-w-full h-dvh px-4 py-8 sm:px-6 sm:py-12 lg:px-8">

		<h2 class="text-xl font-bold text-gray-900 text-center mb-8 sm:text-3xl"><%= title %></h2>
		
		<% if(errorMessage) { %>
			<span> <%= errorMessage %> </span>
		<%}%>
		<form method="POST" class="mx-auto max-w-md space-y-4 rounded-lg border border-gray-300 bg-gray-100 p-6">

		<div>
			<label class="block text-sm font-medium text-gray-900" for="email">Email</label>

			<input class="mt-1 w-full rounded-lg border-gray-300 focus:border-indigo-500 focus:outline-none" id="email" name="email" type="email" placeholder="Introduce tu email" value="<%= values.email ?? '' %>">
		</div>

		<div>
			<label class="block text-sm font-medium text-gray-900" for="password">Contraseña</label>

			<input class="mt-1 w-full rounded-lg border-gray-300 focus:border-indigo-500 focus:outline-none" id="password" name="password" type="password">
		</div>

		

		<button class="block w-full rounded-lg border border-indigo-600 bg-indigo-600 px-12 py-3 text-sm font-medium text-white transition-colors cursor-pointer hover:bg-transparent hover:text-indigo-600" type="submit">
			Iniciar sesión
		</button>
		</form>
	</div>

<%- include('partials/end-page.html') %>
