<%- include('partials/start-page.html', {title: title}) %>
<%- include('partials/components/header-component.html') %>
<main class="px-4 py-4 sm:px-6">
  <h2 class="text-xl font-bold text-gray-900 text-center mb-8 sm:text-3xl"><%= title %></h2>
	<form method="POST" action="/products<%= values._id ? '/edit/' + values._id : '' %>" class="mx-auto max-w-md space-y-4 rounded-lg border border-gray-300 bg-gray-100 p-6">
	
		<label for="name" class="block">
			<span class="text-sm font-medium text-gray-700">Nombre</span>

			<input type="text" id="name" name="name" value="<%=values.name ?? ''%>" class="mt-0.5 w-full rounded border-gray-300 shadow-sm sm:text-sm">
		</label>
		<label for="price" class="block">
			<span class="text-sm font-medium text-gray-700">Precio</span>

			<input type="number" id="price" name="price" value="<%=values.price ?? ''%>" class="mt-0.5 w-full rounded border-gray-300 shadow-sm sm:text-sm">
		</label>
		<fieldset class="block">
			<legend class="sr-only">Checkboxes</legend>
			<p class="text-sm font-medium text-gray-700">Etiquetas</p>
			<div class="flex flex-col items-start gap-3 mt-2">
				<% tags.forEach(tag=> { %>
					<label for="<%=tag%>" class="inline-flex items-center gap-3">
						<input type="checkbox" name="tags" value="<%=tag%>" id="<%=tag%>" class="size-5 rounded border-gray-300 shadow-sm dark:border-gray-600 dark:bg-gray-900 dark:ring-offset-gray-900 dark:checked:bg-blue-600" 
						<%= values.tags?.includes(tag) ? 'checked' : '' %> >

						<span class="font-medium text-gray-700 dark:text-gray-200">
							<%=tag%>
						</span>
					</label>
				<%})%>
			</div>
		</fieldset>
		<footer class="border-t border-slate-200 px-4 py-4 sm:px-6">
			<% if(errorMessage) { %>
				<div class="block text-right mb-4">
					<span class="text-sm text-red-700"><%= errorMessage %></span>
				</div>
			<% } %>
			<div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end ">
				<a href="/products" class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-900 transition-colors hover:bg-slate-50 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-500">
					Cancelar
				</a>
				<button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
					Guardar
				</button>
			</div>
		</footer>
	</form>
</main>
<%- include('partials/end-page.html') %>
