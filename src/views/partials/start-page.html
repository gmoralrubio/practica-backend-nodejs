<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>
		Práctica final Backend con Node.js
	</title>
	<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
	<link rel="stylesheet" href="/styles.css">
</head>

<body class="font-sans">
	<div class="max-w-7xl mx-auto">
	<% if(session.userId) {%>
		<header class="bg-white">
			<div class="mx-auto flex h-16 max-w-7xl items-center gap-8 px-4 sm:px-6 lg:px-8">
				<div class="flex flex-1 items-center justify-end md:justify-between">
					<nav aria-label="Global" class="hidden md:block">
						<ul class="flex items-center gap-6 text-sm">
							<li>
								<a class="text-gray-500 transition hover:text-gray-500/75" href="/"> Inicio </a>
							</li>
							<li>
								<a class="text-gray-500 transition hover:text-gray-500/75" href="/products"> Editar productos </a>
							</li>
						</ul>
					</nav>

					<div class="flex items-center gap-4">
						<div class="sm:flex sm:gap-4">
							<a class="hidden rounded-md bg-gray-100 px-5 py-2.5 text-sm font-medium text-teal-600 transition hover:text-teal-600/75 sm:block" href="/logout">
								Cerrar sesión
							</a>

						</div>

						<button class="block rounded-sm bg-gray-100 p-2.5 text-gray-600 transition hover:text-gray-600/75 md:hidden">
							<span class="sr-only">Toggle menu</span>
							<svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
								<path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
							</svg>
						</button>
					</div>
				</div>
			</div>
		</header>
	<% }%>
