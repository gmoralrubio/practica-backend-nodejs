<div class="card">
	<h3 class="card__title"><%=product.name%></h3>
	<span class="card__price"><%=product.price%>€</span>
	<ul class="card__tag-group">
	<% product.tags.forEach(tag=> { %>
		<li class="card__tag"><%= tag %></li>
	<% }) %>
	<a href="/products/<%= product._id %>">Ver producto</a>
	</ul>
</div>
